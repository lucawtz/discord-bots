<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login - ServerHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0A0A0B;color:#FAFAFA;display:flex;justify-content:center;align-items:center;min-height:100vh;-webkit-font-smoothing:antialiased}
.card{background:#141417;border-radius:12px;padding:40px;width:400px;border:1px solid #27272A;box-shadow:0 16px 48px rgba(0,0,0,0.4)}
.logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px}
.logo svg{color:#3B82F6}
.logo span{font-size:20px;font-weight:700}
.subtitle{text-align:center;color:#A1A1AA;font-size:13px;margin-bottom:32px}
.field{margin-bottom:18px}
.field label{display:block;font-size:12px;color:#A1A1AA;margin-bottom:6px;font-weight:500}
.field input{width:100%;padding:11px 14px;background:#0A0A0B;border:1px solid #27272A;border-radius:6px;color:#FAFAFA;font-size:14px;font-family:inherit;outline:none;transition:border-color 150ms ease}
.field input:focus{border-color:#3B82F6}
.btn{width:100%;padding:11px;border:none;border-radius:6px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;transition:background 150ms ease}
.btn--primary{background:#3B82F6}
.btn--primary:hover{background:#60A5FA}
.btn--secondary{background:transparent;border:1px solid #27272A;color:#A1A1AA;margin-top:12px;font-size:13px}
.btn--secondary:hover{border-color:#3F3F46;color:#FAFAFA}
.msg{padding:10px 14px;border-radius:6px;font-size:13px;text-align:center;margin-bottom:16px}
.msg--error{background:rgba(239,68,68,0.1);color:#EF4444;border:1px solid rgba(239,68,68,0.2)}
.msg--success{background:rgba(34,197,94,0.1);color:#22C55E;border:1px solid rgba(34,197,94,0.2)}
.msg--info{background:rgba(59,130,246,0.1);color:#60A5FA;border:1px solid rgba(59,130,246,0.2)}
.forgot{text-align:center;margin-top:16px}
.forgot a{color:#71717A;font-size:12px;text-decoration:none;transition:color 150ms}
.forgot a:hover{color:#3B82F6}
.footer{text-align:center;margin-top:24px;font-size:11px;color:#3F3F46}
.hidden{display:none}
.back-link{display:inline-flex;align-items:center;gap:4px;color:#71717A;font-size:12px;text-decoration:none;margin-bottom:20px;transition:color 150ms}
.back-link:hover{color:#FAFAFA}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><circle cx="6" cy="6" r="1" fill="#3B82F6"/><circle cx="6" cy="18" r="1" fill="#3B82F6"/></svg>
    <span>ServerHub</span>
  </div>

  <!-- Login Form -->
  <div id="login-view">
    <div class="subtitle">Melde dich an, um fortzufahren</div>
    <div class="msg msg--error hidden" id="login-error">E-Mail oder Passwort ist falsch</div>
    <form method="POST" action="/login">
      <div class="field">
        <label>E-Mail</label>
        <input type="email" name="email" required autofocus autocomplete="email">
      </div>
      <div class="field">
        <label>Passwort</label>
        <input type="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn--primary">Anmelden</button>
    </form>
    <div class="forgot"><a href="#" id="show-forgot">Passwort vergessen?</a></div>
  </div>

  <!-- Forgot Password Form -->
  <div id="forgot-view" class="hidden">
    <a href="#" class="back-link" id="back-to-login">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Zurueck zum Login
    </a>
    <div class="subtitle" style="margin-bottom:12px">Passwort zuruecksetzen</div>
    <p style="font-size:12px;color:#71717A;text-align:center;margin-bottom:24px;line-height:1.6">
      Gib deine E-Mail-Adresse ein. Ein Admin wird benachrichtigt und kann dir einen Reset-Link zusenden.
    </p>
    <div class="msg hidden" id="forgot-msg"></div>
    <div class="field">
      <label>E-Mail</label>
      <input type="email" id="forgot-email" required autocomplete="email">
    </div>
    <button class="btn btn--primary" id="forgot-submit">Anfrage senden</button>
  </div>

  <div class="footer">ServerHub Dashboard</div>
</div>

<script>
// Show login error
if (location.search.includes('error=1')) {
  document.getElementById('login-error').classList.remove('hidden');
}

// Toggle views
document.getElementById('show-forgot').addEventListener('click', (e) => {
  e.preventDefault();
  document.getElementById('login-view').classList.add('hidden');
  document.getElementById('forgot-view').classList.remove('hidden');
  document.getElementById('forgot-email').focus();
});

document.getElementById('back-to-login').addEventListener('click', (e) => {
  e.preventDefault();
  document.getElementById('forgot-view').classList.add('hidden');
  document.getElementById('login-view').classList.remove('hidden');
});

// Submit forgot password
document.getElementById('forgot-submit').addEventListener('click', async () => {
  const email = document.getElementById('forgot-email').value.trim();
  const msgEl = document.getElementById('forgot-msg');
  const btn = document.getElementById('forgot-submit');

  if (!email) {
    msgEl.className = 'msg msg--error';
    msgEl.textContent = 'Bitte gib deine E-Mail-Adresse ein.';
    msgEl.classList.remove('hidden');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Wird gesendet...';

  try {
    const res = await fetch('/api/password-reset/request', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await res.json();

    msgEl.className = 'msg msg--success';
    msgEl.textContent = 'Anfrage gesendet. Ein Admin wird sich bei dir melden.';
    msgEl.classList.remove('hidden');
    btn.textContent = 'Gesendet';
  } catch {
    msgEl.className = 'msg msg--error';
    msgEl.textContent = 'Netzwerkfehler. Bitte erneut versuchen.';
    msgEl.classList.remove('hidden');
    btn.disabled = false;
    btn.textContent = 'Anfrage senden';
  }
});
</script>
</body>
</html>
