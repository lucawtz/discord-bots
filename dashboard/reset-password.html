<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Passwort zuruecksetzen - ServerHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0A0A0B;color:#FAFAFA;display:flex;justify-content:center;align-items:center;min-height:100vh;-webkit-font-smoothing:antialiased}
.card{background:#141417;border-radius:12px;padding:40px;width:400px;border:1px solid #27272A;box-shadow:0 16px 48px rgba(0,0,0,0.4)}
.logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px}
.logo svg{color:#3B82F6}
.logo span{font-size:20px;font-weight:700}
.subtitle{text-align:center;color:#A1A1AA;font-size:13px;margin-bottom:32px}
.field{margin-bottom:18px}
.field label{display:block;font-size:12px;color:#A1A1AA;margin-bottom:6px;font-weight:500}
.field input{width:100%;padding:11px 14px;background:#0A0A0B;border:1px solid #27272A;border-radius:6px;color:#FAFAFA;font-size:14px;font-family:inherit;outline:none;transition:border-color 150ms ease}
.field input:focus{border-color:#3B82F6}
.btn{width:100%;padding:11px;border:none;border-radius:6px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;transition:background 150ms ease}
.btn--primary{background:#3B82F6}
.btn--primary:hover{background:#60A5FA}
.btn--secondary{background:transparent;border:1px solid #27272A;color:#A1A1AA;margin-top:12px}
.btn--secondary:hover{border-color:#3F3F46;color:#FAFAFA}
.msg{padding:12px 14px;border-radius:6px;font-size:13px;text-align:center;margin-bottom:16px}
.msg--error{background:rgba(239,68,68,0.1);color:#EF4444;border:1px solid rgba(239,68,68,0.2)}
.msg--success{background:rgba(34,197,94,0.1);color:#22C55E;border:1px solid rgba(34,197,94,0.2)}
.footer{text-align:center;margin-top:24px}
.footer a{color:#3B82F6;text-decoration:none;font-size:13px}
.footer a:hover{color:#60A5FA}
.hidden{display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><circle cx="6" cy="6" r="1" fill="#3B82F6"/><circle cx="6" cy="18" r="1" fill="#3B82F6"/></svg>
    <span>ServerHub</span>
  </div>

  <!-- No token: invalid state -->
  <div id="no-token" class="hidden">
    <div class="subtitle">Ungueltiger Link</div>
    <div class="msg msg--error">Dieser Reset-Link ist ungueltig oder abgelaufen.</div>
    <div class="footer"><a href="/login">Zurueck zum Login</a></div>
  </div>

  <!-- Has token: show reset form -->
  <div id="reset-form" class="hidden">
    <div class="subtitle">Neues Passwort festlegen</div>
    <div class="msg msg--error hidden" id="form-error"></div>
    <div class="field">
      <label>Neues Passwort</label>
      <input type="password" id="pw1" required autocomplete="new-password" minlength="6">
    </div>
    <div class="field">
      <label>Passwort wiederholen</label>
      <input type="password" id="pw2" required autocomplete="new-password">
    </div>
    <button class="btn btn--primary" id="submit-btn">Passwort speichern</button>
    <div class="footer"><a href="/login">Zurueck zum Login</a></div>
  </div>

  <!-- Success -->
  <div id="success-msg" class="hidden">
    <div class="subtitle">Passwort geaendert</div>
    <div class="msg msg--success">Dein Passwort wurde erfolgreich geaendert.</div>
    <a href="/login" class="btn btn--primary">Zum Login</a>
  </div>
</div>

<script>
(function() {
  const params = new URLSearchParams(location.search);
  const token = params.get('token');

  if (!token) {
    document.getElementById('no-token').classList.remove('hidden');
    return;
  }

  document.getElementById('reset-form').classList.remove('hidden');
  const errorEl = document.getElementById('form-error');
  const btn = document.getElementById('submit-btn');

  btn.addEventListener('click', async () => {
    const pw1 = document.getElementById('pw1').value;
    const pw2 = document.getElementById('pw2').value;

    errorEl.classList.add('hidden');

    if (pw1.length < 6) {
      errorEl.textContent = 'Passwort muss mindestens 6 Zeichen haben.';
      errorEl.classList.remove('hidden');
      return;
    }
    if (pw1 !== pw2) {
      errorEl.textContent = 'Passwoerter stimmen nicht ueberein.';
      errorEl.classList.remove('hidden');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Wird gespeichert...';

    try {
      const res = await fetch('/api/password-reset/confirm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password: pw1 })
      });
      const data = await res.json();

      if (!res.ok) {
        errorEl.textContent = data.error || 'Fehler beim Zuruecksetzen.';
        errorEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Passwort speichern';
        return;
      }

      document.getElementById('reset-form').classList.add('hidden');
      document.getElementById('success-msg').classList.remove('hidden');
    } catch (err) {
      errorEl.textContent = 'Netzwerkfehler. Bitte erneut versuchen.';
      errorEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Passwort speichern';
    }
  });
})();
</script>
</body>
</html>
