name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Syntax check music-bot
        run: node --check bots/music-bot/src/index.js

      - name: Syntax check soundboard-bot
        run: node --check bots/soundboard-bot/src/index.js

      - name: Syntax check dashboard
        run: node --check dashboard/server.js

      - name: Build music-bot webapp
        run: pnpm --filter discord-music-bot-app build

      - name: Build website
        run: pnpm --filter bytebots-website build
