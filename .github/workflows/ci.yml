name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Syntax check all JS files
        run: |
          echo ">> Music Bot"
          find bots/music-bot/src -name "*.js" -exec node --check {} +
          echo ">> Soundboard Bot"
          find bots/soundboard-bot/src -name "*.js" -exec node --check {} +
          echo ">> Dashboard"
          node --check dashboard/server.js

      - name: Build music-bot webapp
        run: pnpm --filter discord-music-bot-app build

      - name: Build website
        run: pnpm --filter bytebots-website build
