# Nginx Config fuer bytebots.de
# SSL wird ueber Cloudflare geregelt (SSL Mode: Full)
# Selbstsigniertes Zertifikat fuer Cloudflare Full Mode

# Music Bot Web App — app.bytebots.de
server {
    listen 80;
    listen 443 ssl;
    server_name app.bytebots.de;

    ssl_certificate /etc/ssl/certs/bytebots.crt;
    ssl_certificate_key /etc/ssl/private/bytebots.key;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket Support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Dashboard — dashboard.bytebots.de
server {
    listen 80;
    listen 443 ssl;
    server_name dashboard.bytebots.de;

    ssl_certificate /etc/ssl/certs/bytebots.crt;
    ssl_certificate_key /etc/ssl/private/bytebots.key;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Soundboard — soundboard.bytebots.de
server {
    listen 80;
    listen 443 ssl;
    server_name soundboard.bytebots.de;

    ssl_certificate /etc/ssl/certs/bytebots.crt;
    ssl_certificate_key /etc/ssl/private/bytebots.key;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Hauptdomain — bytebots.de (redirect zu app)
server {
    listen 80;
    listen 443 ssl;
    server_name bytebots.de;

    ssl_certificate /etc/ssl/certs/bytebots.crt;
    ssl_certificate_key /etc/ssl/private/bytebots.key;

    return 301 https://app.bytebots.de$request_uri;
}
