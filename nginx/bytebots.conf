# Nginx Config fuer bytebots.de
# SSL wird ueber Cloudflare geregelt (SSL Mode: Full)
# Selbstsigniertes Zertifikat fuer Cloudflare Full Mode

# ── Security Headers (gemeinsam) ────────────────────────────────
map $uri $empty {
    default "";
}

# Music Bot Web App — app.bytebots.de
server {
    listen 80;
    server_name app.bytebots.de;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name app.bytebots.de;

    ssl_certificate /etc/ssl/certs/bytebots.crt;
    ssl_certificate_key /etc/ssl/private/bytebots.key;

    # Security Headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket Support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

